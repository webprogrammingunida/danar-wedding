<!doctype html>
<html lang="id" class="no-scroll">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1">

    <title>Danar &amp; Celly | Wedding Invitation</title>

    <meta
        name="description"
        content="Website Undangan Pernikahan Danar & Celly">

    <meta
        name="keywords"
        content="Undangan Digital, Wedding Invitation, Danar Wedding">

    <meta
        name="author"
        content="Danar Wedding">

    <meta
        name="theme-color"
        content="#b78d65">

    <meta
        property="og:type"
        content="website">

    <meta
        property="og:title"
        content="Danar & Celly Wedding">

    <meta
        property="og:description"
        content="Website Undangan Pernikahan Danar & Celly">

    <meta
        property="og:image"
        content="img/SLIDEFINAL.png">

    <meta
        property="og:url"
        content="https://webprogrammingunida.github.io/danar-wedding/">

    <meta
        name="twitter:card"
        content="summary_large_image">

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com">

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link
        rel="preload"
        href="style.css"
        as="style">

    <link
        rel="stylesheet"
        href="style.css">

    <link
        rel="icon"
        href="img/favicon.png">

</head>

<body class="no-scroll">

    <!-- ===================================================== -->
    <!-- Background Music -->
    <!-- ===================================================== -->

    <audio id="bgMusic" loop>
        <source
            src="Safira Inema - Kusuma Wijaya ( Official Music Video ) Kusumaning ratri mung sawiji.mp3"
            type="audio/mpeg">
    </audio>

    <div
        id="musik-wrap"
        class="musik-wrap d-none">

        <button
            id="musik-btn"
            class="musik-btn">

            <span class="musik-disc">
                <i class="bi bi-music-note"></i>
            </span>

        </button>

    </div>

    <!-- ===================================================== -->
    <!-- Guest Overlay -->
    <!-- ===================================================== -->

    <div
        id="layar-nama"
        class="layar-nama">

        <div class="layar-nama-inner">

            <p class="layar-nama-sub">

                The Wedding of

            </p>

            <h1 class="layar-nama-judul">

                Celly
                <span>&</span>
                Danar

            </h1>

            <div class="garis-emas-nama"></div>

            <p class="layar-nama-desc">

                Silakan masukkan nama Anda
                <br>
                untuk membuka undangan ini

            </p>

            <div class="layar-nama-input-wrap">

                <i class="bi bi-person-heart layar-nama-icon"></i>

                <input
                    id="input-nama-tamu"
                    class="layar-nama-input"
                    type="text"
                    placeholder="Nama lengkap Anda."
                    autocomplete="off"
                    maxlength="60">

            </div>

            <!-- onclick sudah dihapus -->
            <button
                id="btn-masuk-undangan"
                class="btn-masuk-undangan">

                <i class="bi bi-envelope-heart"></i>

                Buka Undangan

            </button>

            <p
                id="layar-nama-error"
                class="layar-nama-error d-none">

                Mohon isi nama Anda terlebih dahulu 🙏

            </p>

        </div>

    </div>

    <!-- ===================================================== -->
    <!-- Hero -->
    <!-- ===================================================== -->

    <section
        id="hero"
        class="hero w-100 h-100 p-3 mx-auto text-center d-flex justify-content-center align-items-center">

        <main
            data-aos="fade-up"
            data-aos-duration="1500">

            <h1>

                Celly
                <br>
                &
                <br>
                Danar

            </h1>

            <p>

                Wedding Invitation

            </p>

            <h4 id="hero-kepada">

                Kepada Bapak/Ibu/Saudara/i
                <br>
                di tempat

            </h4>

            <a
                href="#home"
                class="btn btn-lg btn-open-wedding">

                Buka Undangan

            </a>

        </main>

    </section>
</body>
</html>
